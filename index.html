<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mädchenbasketball Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; text-align:center; }
.card { background:white; padding:15px; border-radius:15px; margin:15px auto; max-width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
button { width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none; background:#2563eb; color:white; }
.logo { max-height:150px; margin-bottom:10px; }
.hidden { display:none; }
.counter { display:flex; justify-content:space-between; align-items:center; margin:10px 0; }
.counter button { width:30%; }
.counter span { font-size:22px; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
</style>
</head>

<body>

<img src="logo.png" class="logo" />
<h1>Mädchenbasketball Monitoring</h1>

<!-- START -->
<div id="startScreen" class="card">
  <h3>Ich bin...</h3>
  <button onclick="selectRole('trainer')">Lehrer-Trainerin</button>
  <button onclick="selectRole('coach')">Vereinstrainer*in</button>
  <button onclick="selectRole('athlete')">Athletin</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- ATHLETIN ERSTELLEN -->
  <div class="card" id="createBox">
    <h3>Athletin anlegen</h3>
    <input id="name" placeholder="Name">
    <input id="birthdate" type="date">

    <select id="club">
      <option value="">Verein wählen</option>
      <option>Alba Berlin</option>
      <option>BASS Berlin</option>
      <option>Basketball Gemeinschaft Zehlendorf</option>
      <option>BSC Berlin</option>
      <option>City Basket Berlin</option>
      <option>Einheit Pankow</option>
      <option>Friedenauer TSC</option>
      <option>TSC Spandau</option>
      <option>TuS Lichterfelde</option>
      <option>Weddinger Wiesel</option>
    </select>

    <input id="training" type="number" placeholder="Training/Woche">
    <button onclick="createAthlete()">Athletin erstellen</button>
  </div>

  <!-- QR -->
  <div id="qrBox" class="card hidden">
    <h3>Zugang Athletin</h3>
    <canvas id="qrCanvas"></canvas>
    <p id="codeText"></p>
  </div>

  <!-- LISTE -->
  <div id="athletes"></div>
</div>

<script>

// 🔴 HIER DEINE FIREBASE DATEN EINTRAGEN
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "DEIN_DOMAIN",
  projectId: "DEIN_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= START =================
function selectRole(role) {
  document.getElementById("startScreen").classList.add("hidden");

  if (role === "trainer") {
    document.getElementById("app").classList.remove("hidden");
    loadAthletes();
  }

  if (role === "coach") {
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("createBox").style.display = "none";
    loadAthletes();
  }
}

// ================= CREATE =================
async function createAthlete() {

  const name = document.getElementById("name").value;
  const birthdate = document.getElementById("birthdate").value;
  const club = document.getElementById("club").value;
  const training = document.getElementById("training").value;

  // VALIDIERUNG
  if (!name || !birthdate || !club || !training) {
    alert("Bitte alle Felder ausfüllen!");
    return;
  }

  try {
    const accessCode = Math.random().toString(36).substring(2,8);

    const docRef = await db.collection("athletes").add({
      name,
      birthdate,
      club,
      training,
      accessCode
    });

    const qrLink = window.location.href.split("?")[0] +
      "?athlete=" + docRef.id + "&code=" + accessCode;

    // QR anzeigen
    document.getElementById("qrBox").classList.remove("hidden");
    document.getElementById("codeText").innerText =
      "Zugangscode: " + accessCode;

    QRCode.toCanvas(
      document.getElementById("qrCanvas"),
      qrLink
    );

    alert("Athletin erfolgreich erstellt!");

    loadAthletes();

  } catch (e) {
    console.error(e);
    alert("Fehler: " + e.message);
  }
}

// ================= LOAD =================
async function loadAthletes() {
  const container = document.getElementById("athletes");
  container.innerHTML = "";

  const snapshot = await db.collection("athletes").get();

  snapshot.forEach(doc => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${data.name}</h3>
      <p>${data.club}</p>
      <button onclick="event.stopPropagation(); deleteAthlete('${doc.id}')">❌ Löschen</button>
      <canvas id="qr-${doc.id}"></canvas>
    `;

    container.appendChild(div);

    const qrLink = window.location.href.split("?")[0] +
      "?athlete=" + doc.id + "&code=" + data.accessCode;

    QRCode.toCanvas(document.getElementById(`qr-${doc.id}`), qrLink);
  });
}

// ================= DELETE =================
async function deleteAthlete(id) {
  if (!confirm("Athletin wirklich löschen?")) return;

  await db.collection("athletes").doc(id).delete();

  const entries = await db.collection("entries")
    .where("athleteId","==",id).get();

  entries.forEach(doc => doc.ref.delete());

  loadAthletes();
}

// ================= ATHLET VIEW =================
const params = new URLSearchParams(window.location.search);
const athleteId = params.get("athlete");

if (athleteId) {
  document.body.innerHTML = `
    <h2>Daily Check</h2>

    <div class="counter">
      <button onclick="change('sleep',-1)">-</button>
      <span id="sleep">3</span>
      <button onclick="change('sleep',1)">+</button>
    </div>

    <div class="counter">
      <button onclick="change('academic',-1)">-</button>
      <span id="academic">3</span>
      <button onclick="change('academic',1)">+</button>
    </div>

    <div class="counter">
      <button onclick="change('load',-1)">-</button>
      <span id="load">3</span>
      <button onclick="change('load',1)">+</button>
    </div>

    <button onclick="submit('${athleteId}')">Speichern</button>
  `;
}

function change(field, delta) {
  const el = document.getElementById(field);
  let val = parseInt(el.innerText);
  val += delta;
  if (val < 1) val = 1;
  if (val > 6) val = 6;
  el.innerText = val;
}

async function submit(id) {
  const sleep = parseInt(document.getElementById("sleep").innerText);
  const academic = parseInt(document.getElementById("academic").innerText);
  const load = parseInt(document.getElementById("load").innerText);

  const avg = (sleep + academic + load) / 3;

  await db.collection("entries").add({
    athleteId: id,
    sleep,
    academic,
    load,
    avg,
    date: new Date()
  });

  alert("Gespeichert");
}

</script>

</body>
</html>
